# include ~/.config/omarchy/current/theme/kitty.conf
include themes/cyberdream.conf
startup_session ~/.config/kitty/kitty-startup.session

# Font
font_family FiraCode Nerd Font
allow_italic_fonts yes
bold_italic_font auto
font_size        12
disable_ligatures never
bold_font auto
italic_font auto

# Window
window_padding_width 0 0 2 0
hide_window_decorations yes
confirm_os_window_close 1
background_opacity 0.4
background_blur 1

# Keybindings
map ctrl+insert copy_to_clipboard
map shift+insert paste_from_clipboard
map ctrl+backspace send_text all \x17

# Allow remote access
allow_remote_control yes

# make indentation thinner
box_drawing_scale 0.5, 0.5, 1.0, 1.0

# Aesthetics
# cursor_shape block
# enable_audio_bell no
# Minimal Tab bar styling
tab_bar_edge                top
tab_bar_style               hidden
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# or use WCAG contrast ratio (WCAG AA ~ 4.5)
text_fg_override_threshold 4.5ratio
