# https://wiki.hyprland.org/Configuring/Variables/#general
# https://wiki.hyprland.org/Configuring/Variables/#decoration
$surface = rgba(404040ff)
$foreground = rgba(e6e6e6ff)
$inactive_border = rgba(3a3a3a60)
$accent_grey = rgba(b3b3b3ff)

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 0
    col.active_border = $accent_grey
    col.inactive_border = $inactive_border
    layout = dwindle
}

animations {
    enabled = yes
    animation = workspaces, 1, 3, default, slide
    animation = windows, 1, 3, default, slide
}

decoration {
    rounding = 10

    # shadow {
    #     enabled = true
    #     range = 16
    #     render_power = 3
    #     offset = 2 3
    # }
    # shadow {
    #     enabled = true
    #     range = 16
    #     render_power = 3
    #     offset = 2 3
    #
    #     # visible shadow for focused windows
    #     color = rgba(1a1a1aff)        # or use your $shadow variable
    #
    #     # make inactive windows have no visible shadow
    #     color_inactive = rgba(00000000)
    # }

    blur {
        enabled = true
        size = 2
        passes = 2
        contrast = 0.9
        brightness = 0.8
        vibrancy = 0
        noise = 0.15
        # new_optimizations = on
    }

    fullscreen_opacity = 1.0
}
